name: Vitable Demo Smoke

on:
  workflow_dispatch:
    inputs:
      connection_id:
        description: "Optional IntegrationConnection ID to check instead of bootstrapping a demo connection"
        required: false
        type: string

concurrency:
  group: vitable-demo-smoke
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      RAILS_ENV: test
      VITABLE_CONNECT_API_KEY: ${{ secrets.VITABLE_CONNECT_API_KEY }}
      VITABLE_CONNECT_ENVIRONMENT: demo
      VITABLE_SMOKE_CONNECTION_ID: ${{ inputs.connection_id }}
      VITABLE_SMOKE_REQUESTED_BY: github_actions

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          bundler-cache: true

      - name: Prepare database
        run: bin/rails db:prepare

      - name: Run Vitable demo smoke check
        run: bin/rails vitable:demo_smoke
